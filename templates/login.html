<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA TEAM | تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --red:     #e63946;
  --red2:    #b91c2c;
  --red3:    #ff4d5e;
  --bg:      #05070d;
  --surface: rgba(11,16,32,0.85);
  --border:  rgba(230,57,70,0.2);
  --text:    #e8f0fe;
  --text2:   #8da2c0;
  --text3:   #3d5278;
}
 
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
 
html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Tajawal', sans-serif;
  overflow: hidden;
}
 
/* ── CANVAS ── */
canvas#bg {
  position: fixed;
  inset: 0;
  z-index: 0;
}
 
/* ── VIGNETTE ── */
.vignette {
  position: fixed;
  inset: 0;
  z-index: 1;
  background:
    radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, rgba(5,7,13,0.8) 100%),
    radial-gradient(ellipse 60% 50% at 20% 15%, rgba(230,57,70,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 80% 85%, rgba(17,140,247,0.05) 0%, transparent 55%);
  pointer-events: none;
}
 
/* ── SCAN LINE ── */
.scan {
  position: fixed;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(230,57,70,0.6), transparent);
  z-index: 2;
  animation: scanMove 7s ease-in-out infinite;
  pointer-events: none;
  filter: blur(1px);
}
@keyframes scanMove {
  0%   { top: 0%;   opacity: 0; }
  5%   { opacity: 1; }
  95%  { opacity: 0.5; }
  100% { top: 100%; opacity: 0; }
}
 
/* ── TOP / BOTTOM BARS ── */
.edge-bar {
  position: fixed;
  left: 0; right: 0;
  height: 2px;
  z-index: 5;
  pointer-events: none;
}
.edge-bar.top {
  top: 0;
  background: linear-gradient(90deg, transparent, var(--red), var(--red3), var(--red), transparent);
  animation: edgePulse 4s ease-in-out infinite;
}
.edge-bar.bottom {
  bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(17,140,247,0.6), transparent);
  animation: edgePulse 4s ease-in-out infinite reverse;
}
@keyframes edgePulse {
  0%,100% { opacity:0.4; }
  50%      { opacity:1; box-shadow:0 0 20px var(--red); }
}
 
/* ── CORNER DECORATIONS ── */
.corner {
  position: fixed;
  width: 60px; height: 60px;
  z-index: 5;
  pointer-events: none;
}
.corner::before, .corner::after {
  content: '';
  position: absolute;
  background: var(--red);
  opacity: 0.5;
}
.corner::before { width: 2px; height: 30px; }
.corner::after  { width: 30px; height: 2px; }
 
.corner.tl { top: 16px; right: 16px; }
.corner.tl::before { top:0; right:0; }
.corner.tl::after  { top:0; right:0; }
 
.corner.tr { top: 16px; left: 16px; }
.corner.tr::before { top:0; left:0; }
.corner.tr::after  { top:0; left:0; }
 
.corner.bl { bottom: 16px; right: 16px; }
.corner.bl::before { bottom:0; right:0; }
.corner.bl::after  { bottom:0; right:0; }
 
.corner.br { bottom: 16px; left: 16px; }
.corner.br::before { bottom:0; left:0; }
.corner.br::after  { bottom:0; left:0; }
 
/* ── CENTER LAYOUT ── */
.center {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
 
/* ── CARD ── */
.card {
  width: 420px;
  background: var(--surface);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 40px 44px;
  position: relative;
  overflow: hidden;
  animation: cardIn 0.8s cubic-bezier(.22,1,.36,1) both;
  box-shadow:
    0 0 0 1px rgba(230,57,70,0.08),
    0 32px 80px rgba(0,0,0,0.6),
    0 0 120px rgba(230,57,70,0.05),
    inset 0 1px 0 rgba(255,255,255,0.04);
}
 
@keyframes cardIn {
  from { opacity:0; transform: translateY(40px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
 
/* animated top border */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--red) 30%, var(--red3) 50%, var(--red) 70%, transparent 100%);
  animation: cardTopGlow 3s ease-in-out infinite;
}
@keyframes cardTopGlow {
  0%,100% { opacity:0.5; }
  50%      { opacity:1; box-shadow:0 0 20px var(--red), 0 0 40px var(--red2); }
}
 
/* inner grid texture */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(230,57,70,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(230,57,70,0.015) 1px, transparent 1px);
  background-size: 30px 30px;
  border-radius: 24px;
  pointer-events: none;
}
 
/* ── LOGO ── */
.logo-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 28px;
  animation: logoIn 0.9s cubic-bezier(.22,1,.36,1) 0.1s both;
}
 
@keyframes logoIn {
  from { opacity:0; transform:scale(0.6) rotate(-10deg); }
  to   { opacity:1; transform:scale(1) rotate(0deg); }
}
 
.logo-ring {
  position: relative;
  width: 90px; height: 90px;
}
 
.logo-ring::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid transparent;
  background: linear-gradient(135deg, var(--red), transparent, var(--red3)) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out;
  mask-composite: exclude;
  animation: ringRotate 6s linear infinite;
}
 
@keyframes ringRotate {
  to { transform: rotate(360deg); }
}
 
.logo-ring::after {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1px solid rgba(230,57,70,0.12);
  animation: ringRotate 10s linear infinite reverse;
}
 
.logo-img {
  width: 90px; height: 90px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  box-shadow: 0 0 0 3px rgba(230,57,70,0.2), 0 0 40px rgba(230,57,70,0.3);
}
 
/* ── HEADER TEXT ── */
.header-text {
  text-align: center;
  margin-bottom: 40px;
  animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0.2s both;
}
 
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
 
.brand-title {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 6px;
  background: linear-gradient(90deg, #ffffff 30%, var(--red3) 80%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  display: block;
}
 
.brand-sub {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
  position: relative;
  display: inline-block;
}
 
.brand-sub::before,
.brand-sub::after {
  content: '─';
  color: rgba(230,57,70,0.3);
  margin: 0 10px;
}
 
/* ── FIELDS ── */
.fields {
  animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0.3s both;
}
 
.field {
  margin-bottom: 18px;
  position: relative;
}
 
label {
  display: block;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 10px;
  font-weight: 700;
}
 
.input-wrap {
  position: relative;
}
 
.input-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  opacity: 0.4;
  transition: opacity 0.2s;
  pointer-events: none;
}
 
input {
  width: 100%;
  background: rgba(5,7,13,0.7);
  border: 1px solid rgba(26,37,64,0.8);
  border-radius: 12px;
  padding: 14px 16px 14px 44px;
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  font-size: 14px;
  outline: none;
  transition: all 0.3s;
  backdrop-filter: blur(10px);
}
 
input::placeholder { color: var(--text3); }
 
input:focus {
  border-color: rgba(230,57,70,0.5);
  background: rgba(230,57,70,0.04);
  box-shadow: 0 0 0 3px rgba(230,57,70,0.08), 0 0 20px rgba(230,57,70,0.05);
}
 
input:focus + .input-focus-line {
  width: 100%;
}
 
.input-focus-line {
  position: absolute;
  bottom: 0; right: 0;
  width: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--red), var(--red3));
  transition: width 0.4s ease;
  border-radius: 0 0 12px 12px;
}
 
input:focus ~ .input-icon { opacity: 0.8; }
 
/* ── SUBMIT BUTTON ── */
.btn-wrap {
  margin-top: 28px;
  animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0.4s both;
}
 
.btn {
  width: 100%;
  background: linear-gradient(135deg, var(--red) 0%, var(--red2) 100%);
  border: none;
  border-radius: 12px;
  padding: 15px;
  color: white;
  font-family: 'Tajawal', sans-serif;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 2px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
  box-shadow: 0 4px 24px rgba(230,57,70,0.35);
}
 
.btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transition: left 0.5s ease;
}
 
.btn:hover::before { left: 100%; }
 
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 40px rgba(230,57,70,0.5);
}
 
.btn:active {
  transform: translateY(0px);
  box-shadow: 0 2px 12px rgba(230,57,70,0.3);
}
 
.btn-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
 
.btn-icon {
  font-size: 18px;
  transition: transform 0.3s;
}
.btn:hover .btn-icon { transform: rotate(15deg) scale(1.2); }
 
/* ── ERROR BOX ── */
.error {
  background: rgba(230,57,70,0.08);
  border: 1px solid rgba(230,57,70,0.3);
  border-right: 3px solid var(--red);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--red3);
  font-size: 13px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: errShake 0.4s cubic-bezier(.36,.07,.19,.97);
}
 
@keyframes errShake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-6px); }
  40%     { transform: translateX(6px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX(4px); }
}
 
/* ── FOOTER ── */
.card-footer {
  text-align: center;
  margin-top: 28px;
  animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0.5s both;
}
 
.footer-line {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
  margin-bottom: 8px;
}
 
.footer-dot {
  width: 4px; height: 4px;
  background: var(--red);
  border-radius: 50%;
  animation: dotPulse 2s ease infinite;
}
.footer-dot:nth-child(2) { animation-delay: 0.3s; background: var(--red3); }
.footer-dot:nth-child(3) { animation-delay: 0.6s; }
 
@keyframes dotPulse {
  0%,100% { opacity:0.3; transform:scale(1); }
  50%      { opacity:1;   transform:scale(1.5); }
}
 
.footer-text {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 2px;
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
}
 
.status-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
}
 
.status-dot {
  width: 6px; height: 6px;
  background: #06d6a0;
  border-radius: 50%;
  animation: dotPulse 1.5s ease infinite;
  box-shadow: 0 0 6px #06d6a0;
}
 
/* ── HEX DECORATION ── */
.hex-deco {
  position: absolute;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: rgba(230,57,70,0.15);
  pointer-events: none;
  user-select: none;
  letter-spacing: 1px;
}
.hex-deco.top-left  { top: 16px; right: 20px; }
.hex-deco.top-right { top: 16px; left: 20px; }
.hex-deco.bot-left  { bottom: 16px; right: 20px; }
.hex-deco.bot-right { bottom: 16px; left: 20px; }
 
/* ── CURSOR GLOW ── */
#cursor-glow {
  position: fixed;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(230,57,70,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 2;
  transform: translate(-50%,-50%);
  transition: opacity 0.3s;
}
</style>
</head>
<body>
 
<!-- BACKGROUND -->
<canvas id="bg"></canvas>
<div class="vignette"></div>
<div class="scan"></div>
<div id="cursor-glow"></div>
 
<!-- EDGE BARS -->
<div class="edge-bar top"></div>
<div class="edge-bar bottom"></div>
 
<!-- CORNER DECORATIONS -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
 
<!-- MAIN -->
<div class="center">
  <div class="card">
 
    <!-- HEX DECORATIONS -->
    <div class="hex-deco top-left">0x4E4F56</div>
    <div class="hex-deco top-right">v2.0.1</div>
    <div class="hex-deco bot-left">AUTH</div>
    <div class="hex-deco bot-right">SEC</div>
 
    <!-- LOGO -->
    <div class="logo-wrap">
      <div class="logo-ring">
        <img class="logo-img"
          src="https://media.discordapp.net/attachments/1397976154488438855/1411443052656197722/Nova_Logo.png?ex=6a1de747&is=6a1c95c7&hm=ebdf50ec6b033dd5fcfe701cee9198559ddb92736afafd3b1c4abe3ae18590c7&=&format=webp&quality=lossless&width=562&height=562"
          alt="NOVA LOGO"
          onerror="this.style.display='none';this.parentElement.innerHTML='<div style=\'width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,#e63946,#b91c2c);display:flex;align-items:center;justify-content:center;font-size:36px\'>🛡️</div>'">
      </div>
    </div>
 
    <!-- TITLE -->
    <div class="header-text">
      <span class="brand-title">NOVA TEAM</span>
      <div class="brand-sub">نظام إدارة التذاكر</div>
    </div>
 
    <!-- ERROR (Jinja2 compatible) -->
    {% if error %}
    <div class="error">
      <span>⚠️</span>
      <span>{{ error }}</span>
    </div>
    {% endif %}
 
    <!-- FORM -->
    <form method="POST" class="fields">
 
      <div class="field">
        <label>اسم المستخدم</label>
        <div class="input-wrap">
          <input type="text" name="username" placeholder="أدخل اليوزر..." autocomplete="username" required>
          <div class="input-focus-line"></div>
          <span class="input-icon">👤</span>
        </div>
      </div>
 
      <div class="field">
        <label>كلمة المرور</label>
        <div class="input-wrap">
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
          <div class="input-focus-line"></div>
          <span class="input-icon">🔑</span>
        </div>
      </div>
 
      <div class="btn-wrap">
        <button type="submit" class="btn">
          <div class="btn-inner">
            <span class="btn-icon">🔐</span>
            <span>تسجيل الدخول</span>
          </div>
        </button>
      </div>
 
    </form>
 
    <!-- FOOTER -->
    <div class="card-footer">
      <div class="footer-line">
        <div class="footer-dot"></div>
        <div class="footer-dot"></div>
        <div class="footer-dot"></div>
      </div>
      <div class="status-row">
        <div class="status-dot"></div>
        <span>SYSTEM ONLINE</span>
        <span style="color:rgba(61,82,120,0.5)">•</span>
        <span id="livetime">--:--:--</span>
      </div>
    </div>
 
  </div>
</div>
 
<script>
/* ── PLEXUS BACKGROUND ── */
(function() {
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  let W, H, nodes = [], mouse = { x: -9999, y: -9999 };
 
  const PALETTE = ['#e63946','#ff4d5e','#118cf7','#4da6ff','#06d6a0','#7b2fff','#00d4ff'];
  const N = 70, LINK = 150, REPEL = 180;
 
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
 
  function init() {
    nodes = Array.from({ length: N }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.45,
      vy: (Math.random() - 0.5) * 0.45,
      r: Math.random() * 2.2 + 0.8,
      c: PALETTE[Math.floor(Math.random() * PALETTE.length)],
      ph: Math.random() * Math.PI * 2,
      ps: 0.015 + Math.random() * 0.02,
      a: Math.random() * 0.4 + 0.2
    }));
  }
 
  function hexAlpha(hex, a) {
    return hex + Math.round(a * 255).toString(16).padStart(2, '0');
  }
 
  function frame() {
    ctx.clearRect(0, 0, W, H);
 
    nodes.forEach(n => {
      // move
      n.x += n.vx; n.y += n.vy;
      n.ph += n.ps;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
 
      // mouse repel
      const mx = n.x - mouse.x, my = n.y - mouse.y;
      const md = Math.hypot(mx, my);
      if (md < REPEL && md > 0) {
        const f = (1 - md / REPEL) * 0.25;
        n.vx += (mx / md) * f;
        n.vy += (my / md) * f;
        const spd = Math.hypot(n.vx, n.vy);
        if (spd > 1.8) { n.vx = n.vx / spd * 1.8; n.vy = n.vy / spd * 1.8; }
      }
 
      // pulsing radius
      const pr = n.r + Math.sin(n.ph) * 0.9;
 
      // soft glow halo
      const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, pr * 6);
      g.addColorStop(0, hexAlpha(n.c, n.a * 0.8));
      g.addColorStop(1, hexAlpha(n.c, 0));
      ctx.beginPath();
      ctx.arc(n.x, n.y, pr * 6, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
 
      // core dot
      ctx.beginPath();
      ctx.arc(n.x, n.y, pr, 0, Math.PI * 2);
      ctx.fillStyle = hexAlpha(n.c, n.a + 0.3);
      ctx.fill();
    });
 
    // connections
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const d = Math.hypot(a.x - b.x, a.y - b.y);
        if (d < LINK) {
          const alpha = (1 - d / LINK) * 0.3;
          const lg = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
          lg.addColorStop(0, hexAlpha(a.c, alpha));
          lg.addColorStop(1, hexAlpha(b.c, alpha));
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = lg;
          ctx.lineWidth = 0.7;
          ctx.stroke();
        }
      }
    }
 
    // mouse web
    nodes.forEach(n => {
      const d = Math.hypot(n.x - mouse.x, n.y - mouse.y);
      if (d < REPEL * 1.6) {
        const alpha = (1 - d / (REPEL * 1.6)) * 0.55;
        ctx.beginPath();
        ctx.moveTo(mouse.x, mouse.y);
        ctx.lineTo(n.x, n.y);
        ctx.strokeStyle = `rgba(230,57,70,${alpha})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    });
 
    requestAnimationFrame(frame);
  }
 
  window.addEventListener('resize', () => { resize(); init(); });
  window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    const g = document.getElementById('cursor-glow');
    if (g) { g.style.left = e.clientX + 'px'; g.style.top = e.clientY + 'px'; }
  });
  window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
 
  resize(); init(); frame();
})();
 
/* ── LIVE CLOCK ── */
(function() {
  function tick() {
    const el = document.getElementById('livetime');
    if (el) el.textContent = new Date().toLocaleTimeString('en-GB', { hour12: false });
  }
  tick();
  setInterval(tick, 1000);
})();
 
/* ── INPUT LABEL ANIMATION ── */
document.querySelectorAll('input').forEach(inp => {
  inp.addEventListener('focus', () => {
    inp.closest('.field').querySelector('label').style.color = 'rgba(230,57,70,0.8)';
    inp.previousElementSibling; // focus line handled by CSS
  });
  inp.addEventListener('blur', () => {
    inp.closest('.field').querySelector('label').style.color = '';
  });
});
</script>
</body>
